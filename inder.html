<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Bloc-Notes Privé</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-top: 0;
            font-size: 24px;
        }
        textarea {
            width: 100%;
            height: 400px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        textarea:focus {
            border-color: #4CAF50;
        }
        .status {
            text-align: right;
            font-size: 12px;
            color: #777;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Mon Bloc-Notes</h1>
    <textarea id="note" placeholder="Commence à écrire ici... Tout est sauvegardé automatiquement !"></textarea>
    <div id="status" class="status">En attente de modifications...</div>
</div>

<script>
    // On récupère les éléments HTML
    const zoneTexte = document.getElementById('note');
    const zoneStatus = document.getElementById('status');

    // Étape 1 : Charger le texte sauvegardé au démarrage
    window.onload = function() {
        const texteSauvegarde = localStorage.getItem('monBlocNotes');
        if (texteSauvegarde) {
            zoneTexte.value = texteSauvegarde;
            zoneStatus.textContent = "Dernière note chargée avec succès.";
        }
    };

    // Étape 2 : Sauvegarder automatiquement à chaque fois que l'utilisateur tape une lettre
    zoneTexte.addEventListener('input', function() {
        localStorage.setItem('monBlocNotes', zoneTexte.value);
        zoneStatus.textContent = "Sauvegardé automatiquement à " + new Date().toLocaleTimeString();
    });
</script>

</body>
</html>
